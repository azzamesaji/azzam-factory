<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azzam Brands Factory | ABF</title>
    <style>
        body { background-color: #05070a; color: #e6edf3; font-family: 'Inter', sans-serif; margin: 0; text-align: center; }
        header { padding: 60px 20px; background: radial-gradient(circle at center, #161b22 0%, #05070a 100%); }
        .main-logo { width: 180px; height: 180px; border-radius: 50%; box-shadow: 0 0 40px rgba(88, 166, 255, 0.3); margin-bottom: 20px; transition: 0.5s; object-fit: cover; }
        .section-title { color: #58a6ff; margin: 50px 0 20px; font-size: 2rem; text-transform: uppercase; letter-spacing: 2px; }
        .stickers-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 20px 40px; max-width: 1200px; margin: 0 auto; }
        .card { background: #0d1117; border: 1px solid #30363d; border-radius: 20px; padding: 20px; transition: 0.4s; }
        .card:hover { transform: translateY(-10px); border-color: #58a6ff; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card img { width: 100%; border-radius: 15px; margin-bottom: 15px; }
        .price { color: #3fb950; font-weight: bold; font-size: 1.2rem; margin: 10px 0; }
        .buy-btn { background-color: #f0f6fc; color: #0d1117; padding: 10px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; display: inline-block; transition: 0.3s; }
        .buy-btn:hover { background-color: #58a6ff; color: white; }
    </style>
</head>
<body>

    <header>
        <img src="logoaz.jpeg" alt="ABF Logo" class="main-logo">
        <p style="color: #8b949e;">Professional Design Solutions for Global Clients</p>
        <p style="color: #58a6ff; font-weight: bold;">Instagram: @azzambrands16</p>
    </header>

    <h2 class="section-title">🎮 Gaming Stickers</h2>
    <div class="stickers-grid">
        <div class="card">
            <img src="gaming1.png" alt="Gaming Sticker 1">
            <h3>Pro Player Badge</h3>
            <p class="price">$2.00</p>
            <a href="https://www.instagram.com/azzambrands16" class="buy-btn">Order Now</a>
        </div>
        </div>

    <h2 class="section-title" style="color: #bc8cff;">✨ Minimalist Logos</h2>
    <div class="stickers-grid">
        <div class="card">
            <img src="logo-sample.png" alt="Minimalist Logo 1">
            <h3>Modern Monogram</h3>
            <p class="price">$15.00</p>
            <a href="https://www.instagram.com/azzambrands16" class="buy-btn">Get Yours</a>
        </div>
    </div>

    <footer style="padding: 40px; color: #8b949e;">
        <p>© 2026 Azzam Brands Factory. All rights reserved.</p>
    </footer>

</body>
</html>
